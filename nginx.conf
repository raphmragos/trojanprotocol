worker_processes auto;
events { worker_connections 1024; }

http {
  server {
    listen 8080;
    listen 8080 http2;  # ✅ Paganahin ang HTTP/2 para sa gRPC

    # Pangunahing Pahina - Google
    location / {
      proxy_pass https://www.google.com;
      proxy_set_header Host www.google.com;
      proxy_ssl_server_name on;
      proxy_ssl_protocols TLSv1.2 TLSv1.3;
      
      # Karagdagang setting para sa katatagan
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_cache off;
    }

    # --- Trojan-WS ---
    location = /virgozki {  # ✅ Tumpak na pagtugma para hindi makasagasa sa gRPC
      proxy_pass http://127.0.0.1:10000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_ssl_server_name on;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 86400; # Panatilihing bukas ang koneksyon
    }

    # --- Trojan-gRPC ---
    location ^~ /virgozki/ { # ✅ Mas mataas na prayoridad para sa landas na may /
      proxy_pass http://127.0.0.1:10001/;
      proxy_http_version 2;
      proxy_set_header TE "trailers";
      proxy_set_header Host $host;
      proxy_set_header Content-Type application/grpc;
      proxy_ssl_server_name on;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 86400;
    }

    # --- Trojan-HTTP Upgrade ---
    location /virgozki-upgrade {
      if ($http_upgrade = "") { return 400; } # ✅ Tanggihan kung walang Upgrade
      proxy_pass http://127.0.0.1:10002;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_ssl_server_name on;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 86400;
    }

    # --- Trojan-XHTTP ---
    location /virgozki-xhttp {
      proxy_pass http://127.0.0.1:10003;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_ssl_server_name on;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 600;
    }
  }
}
